version: 2
updates:
  - package-ecosystem: maven
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    open-pull-requests-limit: 5
    groups:
      jackson:
        patterns: ["com.fasterxml.jackson.*"]
      maven-plugins:
        patterns: ["org.apache.maven.plugins:*"]
    ignore:
      # Pin OkHttp on the 3.x line — 4.x requires Kotlin runtime, which
      # we deliberately avoid to keep dependency footprint small for consumers.
      - dependency-name: "com.squareup.okhttp3:okhttp"
        versions: ["4.x", "5.x"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
