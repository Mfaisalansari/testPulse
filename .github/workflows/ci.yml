name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same branch.
# Saves CI minutes; the latest commit is what matters.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Java 8 is the source/target; building on 11/17/21 catches API drift
        # that would only surface for a consumer running on those JDKs.
        java: ['8', '11', '17', '21']

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Build and run unit tests
        run: mvn -B -ntp clean verify

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports-jdk${{ matrix.java }}
          path: '**/target/surefire-reports/'
          retention-days: 14

  javadoc:
    name: Javadoc
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Generate javadoc
        run: mvn -B -ntp -DskipTests javadoc:javadoc

  package:
    name: Package
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build artifacts
        run: mvn -B -ntp -DskipTests package

      - name: Upload jars
        uses: actions/upload-artifact@v7
        with:
          name: jars
          path: '**/target/*.jar'
          retention-days: 14
