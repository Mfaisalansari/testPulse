<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TestPulse — Runs</title>
<link rel="stylesheet" href="/static/app.css">
</head>
<body data-page="runs">

<div id="header"></div>

<div class="page">

    <h1 class="page-title">Recent runs</h1>
    <p class="page-subtitle">Live view of test executions reported to TestPulse. Click any row for scenario detail.</p>

    <div id="banner-host"></div>

    <div class="metrics" id="metrics">
        <div class="metric"><div class="metric-label">Total runs</div><div class="metric-value" id="m-total">—</div></div>
        <div class="metric"><div class="metric-label">Pass rate</div><div class="metric-value success" id="m-passrate">—</div></div>
        <div class="metric"><div class="metric-label">Running now</div><div class="metric-value info" id="m-running">—</div></div>
        <div class="metric"><div class="metric-label">Failed runs</div><div class="metric-value danger" id="m-failed">—</div></div>
    </div>

    <div class="filters" id="status-filters">
        <span class="filter-pill active" data-status="">All <span class="count" id="c-all">0</span></span>
        <span class="filter-pill" data-status="running">Running <span class="count" id="c-running">0</span></span>
        <span class="filter-pill" data-status="failed">Failed <span class="count" id="c-failed">0</span></span>
        <span class="filter-pill" data-status="passed">Passed <span class="count" id="c-passed">0</span></span>
        <span class="filter-pill" data-status="empty">Empty <span class="count" id="c-empty">0</span></span>
        <span class="filter-spacer"></span>
        <input class="filter-input" id="search-input" placeholder="Filter by release, user, division…">
    </div>

    <div class="filters" id="lob-filters">
        <span class="filter-pill active" data-lob="">All LOBs</span>
    </div>

    <div class="filters" id="custom-filters">
        <button class="filter-pill" id="add-filter-btn" style="cursor:pointer; border:0.5px dashed var(--border-medium);">+ Add filter</button>
        <button class="filter-pill" id="save-filter-btn" style="cursor:pointer; display:none;">Save as view…</button>
        <span id="active-filter-pills" style="display:contents;"></span>
        <span id="saved-views" style="display:contents;"></span>
    </div>

    <!-- Filter builder modal -->
    <div id="filter-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:9998; align-items:center; justify-content:center;">
        <div style="background:var(--bg-primary); border-radius:var(--radius-lg); padding:20px; min-width:320px; max-width:420px; box-shadow:0 20px 60px rgba(0,0,0,0.3);">
            <div style="font-size:14px; font-weight:500; margin-bottom:12px;">New filter rule</div>
            <div style="display:grid; grid-template-columns:1fr; gap:8px;">
                <label style="font-size:11px; color:var(--text-secondary);">Field</label>
                <select id="fb-field" class="filter-input" style="width:100%;">
                    <option value="division">Division</option>
                    <option value="release">Release</option>
                    <option value="user">User</option>
                    <option value="environment">Environment</option>
                    <option value="branch">Branch</option>
                    <option value="triggerSource">Trigger source</option>
                    <option value="status">Status</option>
                    <option value="id">Run ID</option>
                    <option value="durationMs">Duration (ms)</option>
                    <option value="scenariosTotal">Scenarios total</option>
                    <option value="scenariosFailed">Scenarios failed</option>
                    <option value="scenariosPassed">Scenarios passed</option>
                    <option value="passRate">Pass rate (0-1)</option>
                </select>
                <label style="font-size:11px; color:var(--text-secondary);">Operator</label>
                <select id="fb-op" class="filter-input" style="width:100%;">
                    <option value="eq">equals</option>
                    <option value="neq">not equals</option>
                    <option value="contains">contains</option>
                    <option value="startsWith">starts with</option>
                    <option value="gt">greater than</option>
                    <option value="lt">less than</option>
                    <option value="gte">≥</option>
                    <option value="lte">≤</option>
                </select>
                <label style="font-size:11px; color:var(--text-secondary);">Value</label>
                <input id="fb-value" class="filter-input" style="width:100%;" placeholder="e.g. Europe, JulyRelease, 60000…">
            </div>
            <div style="display:flex; gap:8px; margin-top:16px; justify-content:flex-end;">
                <button class="filter-pill" id="fb-cancel" style="cursor:pointer;">Cancel</button>
                <button class="filter-pill active" id="fb-add" style="cursor:pointer;">Add filter</button>
            </div>
        </div>
    </div>

    <div class="table-card">
        <div class="table-head" style="grid-template-columns: 100px 1fr 100px 110px 90px 80px;">
            <span>Status</span>
            <span>Run</span>
            <span>Release</span>
            <span>Pass rate</span>
            <span>Duration</span>
            <span>Started</span>
        </div>
        <div id="runs-body">
            <div class="placeholder">Loading runs…</div>
        </div>
    </div>

</div>

<script src="/static/app.js"></script>
<script>
(function() {
    const state = {
        runs: [],
        lobByRunId: {},
        statusFilter: '',
        lobFilter: '',
        searchTerm: '',
        customFilters: [],  // Array of {field, op, value} rules (AND-combined)
    };

    const OP_LABEL = {
        eq: '=', neq: '≠', contains: '~', startsWith: '^', gt: '>', lt: '<', gte: '≥', lte: '≤'
    };

    function evalRule(run, rule) {
        let actual;
        if (rule.field === 'passRate') {
            const total = run.scenariosTotal || 0;
            actual = total === 0 ? 0 : (run.scenariosPassed || 0) / total;
        } else {
            actual = run[rule.field];
        }
        const expected = rule.value;
        const isNum = ['durationMs', 'scenariosTotal', 'scenariosFailed', 'scenariosPassed', 'passRate'].includes(rule.field);
        if (isNum) {
            const a = Number(actual), e = Number(expected);
            switch (rule.op) {
                case 'eq': return a === e;
                case 'neq': return a !== e;
                case 'gt': return a > e;
                case 'lt': return a < e;
                case 'gte': return a >= e;
                case 'lte': return a <= e;
                default: return true;
            }
        }
        const a = String(actual || '').toLowerCase();
        const e = String(expected || '').toLowerCase();
        switch (rule.op) {
            case 'eq': return a === e;
            case 'neq': return a !== e;
            case 'contains': return a.includes(e);
            case 'startsWith': return a.startsWith(e);
            default: return true;
        }
    }

    function showError(msg) {
        document.getElementById('banner-host').innerHTML =
            `<div class="banner error">${TP.escape(msg)}</div>`;
    }

    function updateMetrics() {
        const counts = { '': 0, running: 0, failed: 0, passed: 0, empty: 0 };
        let totalScenarios = 0, passedScenarios = 0;
        state.runs.forEach(r => {
            counts[''] += 1;
            const s = (r.status || '').toLowerCase();
            if (counts[s] !== undefined) counts[s] += 1;
            totalScenarios += (r.scenariosTotal || 0);
            passedScenarios += (r.scenariosPassed || 0);
        });
        document.getElementById('m-total').textContent = counts[''];
        document.getElementById('m-running').textContent = counts.running;
        document.getElementById('m-failed').textContent = counts.failed;
        document.getElementById('m-passrate').textContent =
            totalScenarios === 0 ? '—' : Math.round(100 * passedScenarios / totalScenarios) + '%';
        Object.keys(counts).forEach(k => {
            const el = document.getElementById('c-' + (k || 'all'));
            if (el) el.textContent = counts[k];
        });
    }

    function updateLobFilters() {
        const lobs = new Set();
        Object.values(state.lobByRunId).forEach(set => set.forEach(l => lobs.add(l)));
        const host = document.getElementById('lob-filters');
        const existing = host.querySelectorAll('[data-lob]');
        const have = new Set(Array.from(existing).map(e => e.getAttribute('data-lob')));
        Array.from(lobs).sort().forEach(lob => {
            if (have.has(lob)) return;
            const pill = TP.el('span', {
                class: 'filter-pill',
                'data-lob': lob,
                onclick: () => setLobFilter(lob),
            }, lob);
            host.appendChild(pill);
        });
    }

    function setStatusFilter(val) {
        state.statusFilter = val;
        document.querySelectorAll('#status-filters [data-status]').forEach(el => {
            el.classList.toggle('active', el.getAttribute('data-status') === val);
        });
        renderRuns();
    }

    function setLobFilter(val) {
        state.lobFilter = val;
        document.querySelectorAll('#lob-filters [data-lob]').forEach(el => {
            el.classList.toggle('active', el.getAttribute('data-lob') === val);
        });
        renderRuns();
    }

    function filteredRuns() {
        return state.runs.filter(r => {
            if (state.statusFilter && (r.status || '').toLowerCase() !== state.statusFilter) return false;
            if (state.lobFilter) {
                const lobs = state.lobByRunId[r.id];
                if (!lobs || !lobs.has(state.lobFilter)) return false;
            }
            // Custom filter rules — ALL must match (AND)
            for (const rule of state.customFilters) {
                if (!evalRule(r, rule)) return false;
            }
            if (state.searchTerm) {
                const t = state.searchTerm.toLowerCase();
                const hay = `${r.release || ''} ${r.user || ''} ${r.division || ''} ${r.environment || ''} ${r.id || ''}`.toLowerCase();
                if (!hay.includes(t)) return false;
            }
            return true;
        });
    }

    function renderFilterPills() {
        const host = document.getElementById('active-filter-pills');
        host.innerHTML = state.customFilters.map((r, i) => `
            <span class="filter-pill active" style="gap:6px;">
                ${TP.escape(r.field)} ${OP_LABEL[r.op]} ${TP.escape(String(r.value))}
                <span data-idx="${i}" style="cursor:pointer; margin-left:4px; font-weight:600;" title="Remove">×</span>
            </span>
        `).join('');
        host.querySelectorAll('[data-idx]').forEach(x => {
            x.addEventListener('click', e => {
                const idx = parseInt(e.target.getAttribute('data-idx'), 10);
                state.customFilters.splice(idx, 1);
                renderFilterPills();
                renderRuns();
                document.getElementById('save-filter-btn').style.display =
                    state.customFilters.length > 0 ? 'inline-flex' : 'none';
            });
        });
        document.getElementById('save-filter-btn').style.display =
            state.customFilters.length > 0 ? 'inline-flex' : 'none';
    }

    function renderSavedViews() {
        const host = document.getElementById('saved-views');
        const views = JSON.parse(localStorage.getItem('testpulse.savedViews') || '{}');
        host.innerHTML = Object.keys(views).map(name => `
            <span class="filter-pill" data-view="${TP.escape(name)}" style="cursor:pointer; background:var(--bg-info); color:var(--text-info);">
                ★ ${TP.escape(name)}
                <span data-del-view="${TP.escape(name)}" style="cursor:pointer; margin-left:6px; opacity:0.7;" title="Delete view">×</span>
            </span>
        `).join('');
        host.querySelectorAll('[data-view]').forEach(el => {
            el.addEventListener('click', e => {
                if (e.target.hasAttribute('data-del-view')) return;
                const name = el.getAttribute('data-view');
                state.customFilters = JSON.parse(JSON.stringify(views[name]));
                renderFilterPills();
                renderRuns();
            });
        });
        host.querySelectorAll('[data-del-view]').forEach(el => {
            el.addEventListener('click', e => {
                e.stopPropagation();
                const name = el.getAttribute('data-del-view');
                delete views[name];
                localStorage.setItem('testpulse.savedViews', JSON.stringify(views));
                renderSavedViews();
            });
        });
    }

    function openFilterBuilder() {
        document.getElementById('fb-value').value = '';
        document.getElementById('filter-modal').style.display = 'flex';
        document.getElementById('fb-value').focus();
    }
    function closeFilterBuilder() {
        document.getElementById('filter-modal').style.display = 'none';
    }

    function renderRunRow(run) {
        const total = run.scenariosTotal || 0;
        const passed = run.scenariosPassed || 0;
        const failed = run.scenariosFailed || 0;
        const passPct = total === 0 ? 0 : (passed / total) * 100;
        const failPct = total === 0 ? 0 : (failed / total) * 100;
        const lobs = state.lobByRunId[run.id];
        const lobText = lobs && lobs.size > 0
            ? Array.from(lobs).slice(0, 3).join(', ') + (lobs.size > 3 ? ' +' + (lobs.size - 3) : '')
            : '—';

        const row = TP.el('div', {
            class: 'table-row',
            style: 'grid-template-columns: 100px 1fr 100px 110px 90px 80px;',
            onclick: () => { window.location.href = `/run.html?id=${encodeURIComponent(run.id)}`; },
        });

        row.innerHTML = `
            ${TP.statusPill(run.status)}
            <div style="min-width:0;">
                <div style="font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                    ${TP.escape(lobText)}
                </div>
                <div class="mono" style="color: var(--text-tertiary);">
                    ${TP.escape(run.id)} · ${TP.escape(run.division || '—')} · ${TP.escape(run.user || '—')}
                </div>
            </div>
            <div>${TP.escape(run.release || '—')}</div>
            <div>
                <div style="font-size: 12px; margin-bottom: 4px;">${passed} / ${total}</div>
                <div class="bar-track">
                    <div class="bar-pass" style="width: ${passPct.toFixed(1)}%;"></div>
                    <div class="bar-fail" style="right: 0; width: ${failPct.toFixed(1)}%;"></div>
                </div>
            </div>
            <div>${TP.duration(run.durationMs)}</div>
            <div style="color: var(--text-tertiary);">${TP.timeAgo(run.createdAt)}</div>
        `;
        return row;
    }

    function renderRuns() {
        const body = document.getElementById('runs-body');
        const list = filteredRuns();
        if (list.length === 0) {
            body.innerHTML = `<div class="placeholder">
                <strong>No runs match the current filters.</strong><br>
                ${state.runs.length === 0
                    ? 'Run your tests with -Dtestpulse.enabled=true to start populating data.'
                    : 'Try clearing filters above.'}
            </div>`;
            return;
        }
        body.innerHTML = '';
        list.forEach(r => body.appendChild(renderRunRow(r)));
    }

    async function loadRuns() {
        try {
            const data = await TP.listRuns({ limit: 100 });
            state.runs = data.runs || [];
            // Fetch LOBs for each run (one extra call per run — fine at < 100 runs)
            await Promise.all(state.runs.slice(0, 50).map(async run => {
                try {
                    const detail = await TP.getRun(run.id);
                    const lobs = new Set();
                    (detail.scenarios || []).forEach(s => { if (s.lob) lobs.add(s.lob); });
                    state.lobByRunId[run.id] = lobs;
                } catch (e) {
                    state.lobByRunId[run.id] = new Set();
                }
            }));
            updateMetrics();
            updateLobFilters();
            renderFilterPills();
            renderSavedViews();
            renderRuns();
        } catch (e) {
            showError('Failed to load runs: ' + e.message);
        }
    }

    /* SSE — live updates */
    function subscribeLive() {
        TP.subscribe('global', {
            'run.created': (data) => {
                if (!state.runs.find(r => r.id === data.id)) {
                    state.runs.unshift(data);
                    state.lobByRunId[data.id] = new Set();
                    updateMetrics();
                    renderRuns();
                }
            },
            'run.finished': (data) => {
                const idx = state.runs.findIndex(r => r.id === data.id);
                if (idx >= 0) {
                    state.runs[idx] = { ...state.runs[idx], ...data };
                    updateMetrics();
                    renderRuns();
                }
            },
            'scenario.started': (data) => {
                if (!state.lobByRunId[data.runId]) state.lobByRunId[data.runId] = new Set();
                if (data.lob) {
                    state.lobByRunId[data.runId].add(data.lob);
                    updateLobFilters();
                    renderRuns();
                }
            },
        });
    }

    /* Wire status filter clicks */
    document.querySelectorAll('#status-filters [data-status]').forEach(el => {
        el.addEventListener('click', () => setStatusFilter(el.getAttribute('data-status')));
    });

    /* Wire LOB "All" pill */
    document.querySelector('#lob-filters [data-lob=""]').addEventListener('click', () => setLobFilter(''));

    /* Wire search */
    document.getElementById('search-input').addEventListener('input', e => {
        state.searchTerm = e.target.value.trim();
        renderRuns();
    });

    /* Refresh time-ago labels every 30s */
    setInterval(() => renderRuns(), 30000);

    /* Filter builder modal wiring */
    document.getElementById('add-filter-btn').addEventListener('click', openFilterBuilder);
    document.getElementById('fb-cancel').addEventListener('click', closeFilterBuilder);
    document.getElementById('filter-modal').addEventListener('click', e => {
        if (e.target.id === 'filter-modal') closeFilterBuilder();
    });
    document.getElementById('fb-add').addEventListener('click', () => {
        const field = document.getElementById('fb-field').value;
        const op = document.getElementById('fb-op').value;
        const value = document.getElementById('fb-value').value.trim();
        if (!value) return;
        state.customFilters.push({ field, op, value });
        closeFilterBuilder();
        renderFilterPills();
        renderRuns();
    });
    document.getElementById('save-filter-btn').addEventListener('click', () => {
        const name = prompt('Save this filter combination as:');
        if (!name || !name.trim()) return;
        const views = JSON.parse(localStorage.getItem('testpulse.savedViews') || '{}');
        views[name.trim()] = JSON.parse(JSON.stringify(state.customFilters));
        localStorage.setItem('testpulse.savedViews', JSON.stringify(views));
        renderSavedViews();
    });

    loadRuns().then(subscribeLive);
})();
</script>

</body>
</html>
